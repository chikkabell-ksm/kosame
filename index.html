<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kosame - Central Hub</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kosame: {
              bg: '#fffcf5',
              blue: '#cceaff',
              bluedark: '#8cc6ff',
              brown: '#c68a69',
              browndark: '#9c6242',
              yellow: '#ffdf73',
              pink: '#ffd1dc',
              cream: '#fdf4e1'
            }
          },
          fontFamily: {
            sans: ['Mali', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { 
      background-color: #fffcf5; 
      font-family: 'Mali', cursive, sans-serif; 
      color: #c68a69; 
      overflow-x: hidden; 
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-in { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    @keyframes popIn { 
      0% { transform: scale(0.9); opacity: 0; } 
      70% { transform: scale(1.05); opacity: 1; } 
      100% { transform: scale(1); opacity: 1; } 
    }
    .animate-pop { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Stripe Pattern Header & Footer */
    .striped-header-footer {
      background-image: linear-gradient(-45deg, #cceaff 25%, #e5f4ff 25%, #e5f4ff 50%, #cceaff 50%, #cceaff 75%, #e5f4ff 75%, #e5f4ff 100%);
      background-size: 40px 40px;
      animation: moveStripes 2s linear infinite;
      border-bottom: 4px solid #fdf4e1;
      position: fixed;
      width: 100%;
      height: 24px;
      z-index: 50;
    }
    .stripe-top { top: 0; left: 0; }
    .stripe-bottom { bottom: 0; left: 0; border-top: 4px solid #fdf4e1; border-bottom: none; }

    @keyframes moveStripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    /* Animation สำหรับดาวกระพริบวิ้งค์ๆ */
    @keyframes twinkleStar {
      0%, 100% { opacity: 0.2; transform: scale(0.6); }
      50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 4px rgba(255, 223, 115, 0.8)); }
    }
    .star { position: absolute; pointer-events: none; animation: twinkleStar linear infinite; z-index: 0; }

    /* Kosame Menu Button Style */
    .menu-btn {
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      border: 2px solid #cceaff;
      border-radius: 1.5rem;
      box-shadow: 0 4px 0 0 #cceaff;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 0 #cceaff;
      border-color: #8cc6ff;
    }
    .menu-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 0 #cceaff;
    }
  </style>
</head>
<body class="selection:bg-kosame-yellow/50 selection:text-kosame-browndark">
  
  <div class="striped-header-footer stripe-top shadow-sm"></div>
  <div class="striped-header-footer stripe-bottom shadow-[0_-2px_4px_rgba(0,0,0,0.02)]"></div>

  <div id="root" class="relative z-10 w-full flex justify-center min-h-screen items-center py-10"></div>

  <script type="text/babel">
    const { useEffect, useRef } = React;

    const Icon = ({ name, size = 24, className = "" }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current && window.lucide) {
          spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
          window.lucide.createIcons({
            attrs: { width: size, height: size },
            root: spanRef.current
          });
        }
      }, [name, size, className]);
      return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
    };

    const SkyBackground = () => {
      const SparkleIcon = ({ color, size }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={color} xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L14.64 9.36L22 12L14.64 14.64L12 22L9.36 14.64L2 12L9.36 9.36L12 2Z" />
        </svg>
      );
      const stars = Array.from({ length: 25 }).map((_, i) => {
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const size = 12 + Math.random() * 18;
        const animDuration = 3 + Math.random() * 4;
        const animDelay = Math.random() * 5;
        const colors = ['#ffdf73', '#ffd1dc', '#ffffff'];
        return (
          <div key={`star-${i}`} className="star" style={{ left: `${left}vw`, top: `${top}vh`, animationDuration: `${animDuration}s`, animationDelay: `${animDelay}s` }}>
            <SparkleIcon color={colors[i % colors.length]} size={size} />
          </div>
        );
      });
      return <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">{stars}</div>;
    };

    const MenuButton = ({ title, desc, icon, href, delay, colorClass, iconBgClass }) => (
      <a 
        href={href} 
        className="menu-btn flex items-center p-4 gap-4 w-full group animate-in opacity-0"
        style={{ animationDelay: `${delay}ms` }}
      >
        <div className={`w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors duration-300 ${iconBgClass}`}>
          <Icon name={icon} size={24} className={colorClass} />
        </div>
        <div className="flex-1 text-left">
          <h2 className="text-[15px] font-bold text-kosame-browndark leading-tight mb-0.5 group-hover:text-kosame-blue transition-colors">{title}</h2>
          <p className="text-[11px] font-semibold text-kosame-brown/70 leading-tight">{desc}</p>
        </div>
        <div className="w-8 h-8 rounded-full bg-kosame-bg flex items-center justify-center text-kosame-blue/50 group-hover:bg-kosame-yellow group-hover:text-white transition-all duration-300 group-hover:translate-x-1">
            <Icon name="chevron-right" size={18} />
        </div>
      </a>
    );

    const App = () => {
      
      const menuItems = [
        {
          title: "CHECK QUEUE",
          desc: "เช็คคิวงาน สถานะ และกำหนดส่ง",
          icon: "calendar-days",
          href: "https://ksm-bb.github.io/kosame-q/",
          colorClass: "text-white",
          iconBgClass: "bg-kosame-blue group-hover:bg-kosame-bluedark",
          delay: 100
        },
        {
          title: "PRICE LIST",
          desc: "รายละเอียดราคาและข้อตกลง",
          icon: "tag",
          href: "https://ksm-bb.github.io/price-list/",
          colorClass: "text-kosame-brown",
          iconBgClass: "bg-kosame-yellow group-hover:bg-[#ebd453]",
          delay: 200
        },
        {
          title: "EXAMPLE WORK",
          desc: "แกลลอรี่รวมผลงานที่ผ่านมา",
          icon: "image",
          href: "https://ksm-bb.github.io/kosame-example/",
          colorClass: "text-white",
          iconBgClass: "bg-kosame-brown group-hover:bg-kosame-browndark",
          delay: 300
        },
        {
          title: "YCH BASE",
          desc: "ดูตัวอย่าง YCH Base ทั้งหมด",
          icon: "layers",
          href: "https://ksm-bb.github.io/ych-base/",
          colorClass: "text-kosame-blue",
          iconBgClass: "bg-kosame-blue/20 group-hover:bg-kosame-blue/30",
          delay: 400
        },
        {
          title: "WEB APP",
          desc: "ระบบส่งบรีฟงาน (สำหรับลูกค้า)",
          icon: "layout-template",
          href: "https://ksm-bb.github.io/-brief-webapp/",
          colorClass: "text-kosame-brown",
          iconBgClass: "bg-kosame-cream group-hover:bg-[#f0e4ca]",
          delay: 500
        }
      ];

      return (
        <div className="w-full max-w-sm mx-auto relative px-5 pb-12 pt-8 z-10 flex flex-col items-center">
          <SkyBackground />
          
          {/* Header Profile Section */}
          <div className="flex flex-col items-center mb-8 animate-pop">
            <div className="relative mb-4">
              {/* ตกแต่งกรอบโปรไฟล์ */}
              <div className="absolute inset-0 bg-kosame-yellow rounded-full blur-md opacity-40 animate-pulse"></div>
              <div className="w-32 h-32 bg-white rounded-full border-[5px] border-kosame-blue overflow-hidden shadow-[0_8px_0_0_#cceaff] relative z-10">
                <img 
                  src="https://i.ibb.co/nK37qTf/4126-20250325120539.png" 
                  className="w-full h-full object-cover" 
                  alt="Kosame Profile" 
                />
              </div>
              {/* ดาวประดับ */}
              <div className="absolute -top-2 -right-2 text-kosame-yellow z-20 animate-bounce"><Icon name="sparkles" size={24}/></div>
              <div className="absolute bottom-2 -left-3 text-kosame-blue z-20"><Icon name="star" size={18}/></div>
            </div>

            <h1 className="text-3xl font-extrabold text-kosame-browndark tracking-wide mt-2">Kosame</h1>
            <p className="text-sm font-bold text-kosame-brown mt-1 flex items-center gap-1.5 bg-white/60 px-4 py-1.5 rounded-full border border-kosame-cream backdrop-blur-sm">
               <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
               Welcome to my art corner 🎨
            </p>
          </div>

          {/* Social / Contact Mini Links (Optional: สามารถใส่ลิงก์ได้) */}
          <div className="flex gap-3 mb-8 animate-in opacity-0" style={{ animationDelay: '50ms' }}>
             <a href="#" className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-kosame-blue border-2 border-kosame-cream hover:bg-kosame-blue hover:text-white hover:border-kosame-blue transition-colors shadow-sm">
                <Icon name="twitter" size={18}/>
             </a>
             <a href="#" className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-kosame-blue border-2 border-kosame-cream hover:bg-kosame-blue hover:text-white hover:border-kosame-blue transition-colors shadow-sm">
                <Icon name="instagram" size={18}/>
             </a>
             <a href="#" className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-kosame-blue border-2 border-kosame-cream hover:bg-kosame-blue hover:text-white hover:border-kosame-blue transition-colors shadow-sm">
                <Icon name="mail" size={18}/>
             </a>
          </div>

          {/* Menu Buttons List */}
          <div className="w-full flex flex-col gap-4">
             {menuItems.map((item, index) => (
                <MenuButton key={index} {...item} />
             ))}
          </div>

          {/* Footer Text */}
          <div className="mt-12 text-center animate-in opacity-0" style={{ animationDelay: '600ms' }}>
             <p className="text-[10px] font-bold text-kosame-brown/60 uppercase tracking-widest">© 2026 Kosame Art. All rights reserved.</p>
          </div>
          
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
