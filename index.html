<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kosame - Central Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kosame: {
              bg: '#fffcf5',
              blue: '#cceaff',
              bluedark: '#8cc6ff',
              brown: '#c68a69',
              browndark: '#9c6242',
              yellow: '#ffdf73',
              pink: '#ffd1dc',
              cream: '#fdf4e1'
            }
          },
          fontFamily: {
            sans: ['Mali', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { 
      background-color: #fffcf5; 
      font-family: 'Mali', cursive, sans-serif; 
      color: #c68a69; 
      overflow-x: hidden; 
    }
    
    /* แถบลายทางสีฟ้า - ปรับให้เลื่อนได้ */
    .striped-header-footer {
      background-image: linear-gradient(
        -45deg,
        #cceaff 25%,
        #e5f4ff 25%,
        #e5f4ff 50%,
        #cceaff 50%,
        #cceaff 75%,
        #e5f4ff 75%,
        #e5f4ff 100%
      );
      background-size: 40px 40px;
      animation: moveStripes 2s linear infinite;
      border-bottom: 4px solid #fdf4e1;
    }
    .striped-footer {
      border-top: 4px solid #fdf4e1;
      border-bottom: none;
    }

    @keyframes moveStripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    /* Animation สำหรับดาวกระพริบวิ้งค์ๆ */
    @keyframes twinkleStar {
      0%, 100% { opacity: 0.2; transform: scale(0.6); }
      50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 4px rgba(255, 223, 115, 0.8)); }
    }
    
    .star {
      position: absolute;
      pointer-events: none;
      animation: twinkleStar linear infinite;
      z-index: 0;
    }

    .cute-scrollbar::-webkit-scrollbar { width: 8px; }
    .cute-scrollbar::-webkit-scrollbar-track { background: #fffcf5; border-radius: 4px; }
    .cute-scrollbar::-webkit-scrollbar-thumb { background: #ffdf73; border-radius: 4px; border: 2px solid #fffcf5; }
    
    .animate-pop { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes popIn { 
      from { opacity: 0; transform: translateY(20px) scale(0.95); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }
  </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-kosame-yellow/50 selection:text-kosame-browndark">
  
  <div class="h-6 w-full striped-header-footer fixed top-0 left-0 z-20 shadow-sm"></div>

  <div id="root" class="relative z-10 w-full flex-grow flex justify-center mt-6 mb-12"></div>

  <div class="h-6 w-full striped-header-footer striped-footer fixed bottom-0 left-0 z-20 shadow-[0_-2px_4px_rgba(0,0,0,0.02)]"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, size = 18, className = "" }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current && window.lucide) {
          window.lucide.createIcons({
            attrs: { class: className, width: size, height: size },
            nameAttr: 'data-lucide',
            icons: { [name]: window.lucide.icons[name] },
            root: iconRef.current.parentElement
          });
        }
      }, [name, size, className]);
      return <i data-lucide={name} ref={iconRef} className={className}></i>;
    };

    // คอมโพเนนต์ ท้องฟ้าที่มีแค่ดาววิ้งค์ๆ
    const SkyBackground = () => {
      // SVG สำหรับดาว 4 แฉก
      const SparkleIcon = ({ color, size }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={color} xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L14.64 9.36L22 12L14.64 14.64L12 22L9.36 14.64L2 12L9.36 9.36L12 2Z" />
        </svg>
      );

      // สร้างดาววิ้งค์ๆ 25 ดวง สุ่มตำแหน่ง
      const stars = Array.from({ length: 25 }).map((_, i) => {
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const size = 12 + Math.random() * 18; // ขนาด 12px - 30px
        const animDuration = 3 + Math.random() * 4; // กระพริบทุกๆ 3s - 7s
        const animDelay = Math.random() * 5;
        const colors = ['#ffdf73', '#ffd1dc', '#ffffff']; // ดาวสีเหลือง, ชมพู, ขาว

        return (
          <div
            key={`star-${i}`}
            className="star"
            style={{
              left: `${left}vw`,
              top: `${top}vh`,
              animationDuration: `${animDuration}s`,
              animationDelay: `${animDelay}s`,
            }}
          >
            <SparkleIcon color={colors[i % colors.length]} size={size} />
          </div>
        );
      });

      return (
        <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
          {stars}
        </div>
      );
    };

    const ReturnButton = ({ setView }) => (
      <div className="flex justify-center mt-8">
        <button onClick={() => setView('home')} className="group flex items-center gap-2 px-6 py-3 bg-kosame-yellow text-white font-bold rounded-full border-4 border-white shadow-[0_4px_0_0_#e6c35c] hover:translate-y-1 hover:shadow-[0_0px_0_0_#e6c35c] transition-all relative z-20">
          <Icon name="arrow-left" size={20} />
          <span>กลับหน้าหลัก</span>
        </button>
      </div>
    );

    const HomeView = ({ setView }) => (
      <div className="flex flex-col gap-6 animate-pop p-4 pt-8 w-full max-w-md relative z-10">
         <header className="relative flex flex-col items-center justify-center text-center p-4">
            
            <div className="w-28 h-28 bg-white rounded-full shadow-md mb-4 border-4 border-kosame-blue overflow-hidden relative group z-10">
                <img 
                    src="https://i.ibb.co/nK37qTf/4126-20250325120539.png" 
                    alt="Kosame Profile" 
                    className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                />
            </div>
            
            <h1 className="text-4xl font-bold text-kosame-browndark tracking-wide mb-1 z-10 drop-shadow-sm">Kosame</h1>
            <p className="text-sm font-medium text-kosame-brown bg-kosame-cream px-4 py-1 rounded-full border border-white shadow-sm mt-1 z-10">
                Welcome to my art corner ✧.*
            </p>
        </header>

        <nav className="flex flex-col gap-4 mt-2 z-10">
          {[
            { 
              id: 'queue', 
              label: 'CHECK QUEUE', 
              desc: 'ตรวจสอบคิวงานได้ที่นี่',
              icon: 'clipboard-list', 
              url: 'https://ksm-bb.github.io/kosame-q/',
              newTab: false
            },
            { 
              id: 'tos', 
              label: 'TOS', 
              desc: 'ข้อตกลงและเงื่อนไขในการสั่งงาน',
              icon: 'book-heart', 
              action: () => setView('tos')
            },
            { 
              id: 'webapp', 
              label: 'WEB APP', 
              desc: 'รายละเอียด และราคา',
              icon: 'monitor', 
              url: 'https://ksm-bb.github.io/-brief-webapp/',
              newTab: false
            },
            { 
              id: 'price', 
              label: 'PRICE LIST', 
              desc: 'เช็คราคางานวาดที่นี่',
              icon: 'tag', 
              url: 'https://ksm-bb.github.io/price-list/', 
              newTab: false
            },
            { 
              id: 'example', 
              label: 'EXAMPLE WORK', 
              desc: 'ตัวอย่างผลงาน',
              icon: 'image', 
              url: 'https://ksm-bb.github.io/kosame-example/',
              newTab: false
            },
            { 
              id: 'ych', 
              label: 'YCH BASE', 
              desc: 'เลือกท่าทางที่เรารับวาด',
              icon: 'sparkles', 
              url: 'https://ksm-bb.github.io/ych-base/',
              newTab: false
            },
          ].map((item, idx) => (
            <button 
                key={item.id}
                onClick={() => {
                    if (item.action) {
                        item.action();
                    } else {
                        window.open(item.url, item.newTab ? '_blank' : '_self');
                    }
                }} 
                className="group relative w-full p-4 flex items-center gap-4 bg-white/90 backdrop-blur-sm rounded-2xl border-2 border-kosame-blue shadow-[0_4px_0_0_#cceaff] hover:translate-y-1 hover:shadow-[0_0px_0_0_#cceaff] transition-all text-left"
            >
                <div className="relative p-3 bg-kosame-cream rounded-xl text-kosame-browndark group-hover:bg-kosame-yellow group-hover:text-white transition-colors">
                    <Icon name={item.icon} size={24} />
                </div>
                
                <div className="flex-grow">
                    <h3 className="text-lg font-bold text-kosame-browndark">{item.label}</h3>
                    <p className="text-sm text-kosame-brown leading-tight">{item.desc}</p>
                </div>

                <div className="text-kosame-blue group-hover:text-kosame-yellow transition-colors bg-kosame-bg p-2 rounded-full">
                     <Icon name={item.newTab ? "external-link" : "chevron-right"} size={18} />
                </div>
            </button>
          ))}
        </nav>
      </div>
    );

    const TOSView = ({ setView }) => {
        const tosData = [
            {
                icon: "clock", title: "Timeline Working",
                desc: "ระยะการทำงานสามารถดูได้ที่หน้า check queue เวลาที่กำหนดเป็นเวลาโดยประมาณ บางงานอาจได้รับเร็วกว่ากำหนด",
                box: "หากมีเหตุจำเป็นที่ทำให้งานล่าช้าจะแจ้งให้ทราบก่อนทุกครั้งนะคะ 🙇‍♀️"
            },
            {
                icon: "activity", title: "Progress Policy",
                desc: "งดเร่งงานก่อนถึงระยะเวลาที่กำหนด แต่สามารถสอบถามอัพเดทงานได้น้า โดยปกติหากเป็นงานที่ใช้ระยะเวลานาน ทางเราจะส่งอัพเดททุกๆ 3 วันค่ะ"
            },
            {
                icon: "coffee", title: "Operation Hours",
                desc: "เวลาทำงาน ของทางเราคือ 19.00 น.-23.00 น. นอกเหนือจากเวลานี้จะสามารถตอบแชท หรืออัพเดทตามปกติค่ะ",
                note: "(แต่ยังไม่สามารถวาดงาน หรือแก้งานได้ในทันทีนะคะ)"
            },
            {
                icon: "edit-3", title: "Modification Rules",
                desc: "ก่อนถึงคิว สามารถแจ้งขอเปลี่ยนบรีฟตัวละครได้ แต่ไม่อนุญาตให้เพิ่มจำนวน หรือเพิ่มสเกลน้า",
                box: "เนื่องจากทางเรากำหนดขอบเขตเวลาไว้ตั้งแต่ลงคิว หากเปลี่ยนแปลงตรงนี้อาจจะกระทบกับคิวอื่นค่ะ 🥺"
            },
            {
                icon: "image", title: "File Specifications",
                isSpec: true,
                box: "หากต้องการขนาดอื่น แจ้งก่อนเริ่มงานได้เลยค่ะ ✨"
            },
            {
                icon: "heart", title: "Portfolios",
                desc: "ทางร้านจะนำผลงานของท่านไปเป็นตัวอย่างคอมมิชชั่นนะคะ",
                note: "(หากไม่สะดวก หรือไม่ต้องการให้เผยแพร่ รบกวนแจ้งก่อนเริ่มงานทุกครั้งน้า)"
            }
        ];

        return (
          <div className="flex flex-col gap-6 animate-pop pb-6 p-4 pt-8 w-full max-w-md relative z-10">
             <div className="flex items-center gap-4 bg-white/90 backdrop-blur-sm p-4 rounded-2xl border-2 border-kosame-cream shadow-sm">
                <div className="bg-kosame-yellow p-3 rounded-full text-white">
                  <Icon name="book-heart" size={28} />
                </div>
                <div>
                  <h2 className="text-2xl font-bold text-kosame-browndark">Terms of Service</h2>
                  <p className="text-sm text-kosame-brown">ข้อตกลงและเงื่อนไข</p>
                </div>
            </div>

            <div className="max-h-[60vh] overflow-y-auto cute-scrollbar pr-2 flex flex-col gap-4">
                {tosData.map((item, idx) => (
                    <div key={idx} className="bg-white/90 backdrop-blur-sm p-5 rounded-2xl border-2 border-kosame-blue/30 shadow-sm relative">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="bg-kosame-cream p-2 rounded-full text-kosame-browndark">
                                <Icon name={item.icon} size={18} />
                            </div>
                            <h3 className="text-lg font-bold text-kosame-browndark">{item.title}</h3>
                        </div>
                        
                        {item.isSpec ? (
                            <div className="text-sm text-kosame-brown leading-relaxed flex flex-col gap-2 mb-2 bg-kosame-bg/80 p-3 rounded-xl">
                                <div className="flex items-center justify-between"><span className="font-bold">Emote:</span> <span className="bg-white px-2 py-0.5 rounded border border-kosame-cream">1000x1000 px</span></div>
                                <div className="flex items-center justify-between"><span className="font-bold">Others:</span> <span className="bg-white px-2 py-0.5 rounded border border-kosame-cream">2048x2048 px</span></div>
                            </div>
                        ) : (
                            <p className="text-sm text-kosame-brown leading-relaxed mb-2">{item.desc}</p>
                        )}
                        
                        {item.note && <p className="text-xs text-kosame-brown/70 mt-1">{item.note}</p>}
                        
                        {item.box && (
                            <div className="mt-4 p-3 bg-kosame-yellow/10 border-2 border-kosame-yellow/30 rounded-xl text-sm text-kosame-browndark flex gap-2 items-start">
                                <Icon name="info" size={16} className="mt-0.5 shrink-0 text-kosame-yellow" />
                                <span>{item.box}</span>
                            </div>
                        )}
                    </div>
                ))}
            </div>
            <ReturnButton setView={setView} />
          </div>
        );
    };

    const App = () => {
      const [view, setView] = useState('home');

      return (
        <div className="w-full flex justify-center items-center relative min-h-screen">
          
          <SkyBackground />
          
          <div className="relative z-10 w-full flex flex-col items-center">
            {view === 'home' && <HomeView setView={setView} />}
            {view === 'tos' && <TOSView setView={setView} />}
            
            <footer className="mt-4 pb-4 flex flex-col items-center text-kosame-brown text-xs font-medium z-10">
                <p>Thank you for your support ♡</p>
            </footer>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) { e.preventDefault(); return false; }
    if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); return false; }
    if (e.ctrlKey && (e.key === 'S' || e.key === 's')) { e.preventDefault(); return false; }
  });
</script>
</body>
</html>
